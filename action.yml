name: "React Doctor Review"
description: "Review React pull requests with inline doctor diagnostics, a sticky summary comment, thread reconciliation, and a check run."
branding:
  icon: "activity"
  color: "blue"

inputs:
  token:
    description: "GitHub token used to read the PR, post inline comments, upsert the sticky summary, and create the check run. Defaults to the workflow token; pass a PAT or App installation token to comment on fork PRs or to brand the bot identity."
    default: ${{ github.token }}
  directory:
    description: "Project directory to scan, relative to the consumer's checkout. Defaults to the checkout root."
    default: "."
  node-version:
    description: "Node.js version to use on the runner."
    default: "22"

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}

    - uses: pnpm/action-setup@v4

    - name: Install action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      env:
        CI: "true"
      # HACK: filter by package path, not name - the root workspace and
      # packages/react-doctor share the name "react-doctor", and a bare
      # --filter react-doctor matches both, which pulls the website
      # workspace into the install scope unnecessarily.
      run: pnpm install --frozen-lockfile --filter "@react-doctor/review-action..." --filter "./packages/react-doctor..."

    - name: Build react-doctor
      shell: bash
      working-directory: ${{ github.action_path }}
      # HACK: filter turbo by package path, not by name. Both the workspace
      # root and packages/react-doctor are named "react-doctor", so a bare
      # `--filter react-doctor` is ambiguous; the path filter pins it to
      # packages/react-doctor. Turbo's `dependsOn: ["^build"]` then builds
      # the four workspace deps (@react-doctor/core, /types, /project-info,
      # oxlint-plugin-react-doctor) in topological order - required because
      # `vp pack` treats workspace deps as external imports, not bundled.
      # Skipping turbo and running `pnpm build` directly in packages/
      # react-doctor produces a dist/ that crashes at runtime with
      # ERR_MODULE_NOT_FOUND on `@react-doctor/core`.
      run: pnpm exec turbo run build --filter=./packages/react-doctor

    - name: Run React Doctor PR review
      shell: bash
      working-directory: ${{ inputs.directory }}
      env:
        REACT_DOCTOR_TOKEN: ${{ inputs.token }}
        INPUT_DIRECTORY: ${{ inputs.directory }}
        ACTION_REVIEW_DIR: ${{ github.action_path }}/actions/review
      run: |
        pnpm --dir "$ACTION_REVIEW_DIR" exec tsx "$ACTION_REVIEW_DIR/src/index.ts"
